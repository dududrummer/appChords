name: Build e Deploy para Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🔨 Fazer o build
        run: npm run build

      - name: 📦 Instalar lftp
        run: sudo apt-get install -y lftp

      - name: 🚀 Deploy via SFTP para Hostinger
        run: |
          lftp -e "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            set net:max-retries 3;
            open sftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}:22;
            mirror --reverse --delete --verbose ./dist/ /public_html/;
            bye
          "
