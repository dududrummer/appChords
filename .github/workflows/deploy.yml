name: Build e Deploy para Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🔨 Fazer o build
        run: npm run build

      - name: 🚀 Enviar para Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.verusdeal.com }}
          username: ${{ secrets.u699510729.verusdeal.com }}
          password: ${{ secrets.Jesuscristo85@ }}
          local-dir: ./dist/
          server-dir: ${{ secrets./public_html/appChords }}
